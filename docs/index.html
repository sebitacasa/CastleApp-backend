<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoes & Paths — Legal</title>
  <style>
    :root {
      --bg: #FAF8F5; --card: #FFFFFF; --text: #1A1A1A;
      --sub: #6B6B6B; --gold: #B8943F; --border: #E8E2D9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .logo { font-size: 13px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--sub); margin-bottom: 32px; font-size: 15px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a {
      display: block; padding: 14px 28px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); text-decoration: none;
      font-weight: 600; font-size: 15px; transition: border-color .15s;
    }
    a:hover { border-color: var(--gold); color: var(--gold); }
    footer { margin-top: 48px; font-size: 12px; color: var(--sub); }
  </style>
</head>
<body>
  <p class="logo">&#9679; Echoes &amp; Paths</p>
  <h1>Legal Documents</h1>
  <p>Discover the past — responsibly.</p>
  <div class="links">
    <a href="privacy/">&#128274; Privacy Policy</a>
    <a href="terms/">&#128196; Terms of Use</a>
  </div>
  <footer>&copy; 2026 Echoes &amp; Paths</footer>
</body>
</html>
